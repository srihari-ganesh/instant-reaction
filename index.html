<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Words</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .word-row { animation: slide-in 0.6s ease forwards; }
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- ── Landing ─────────────────────────────────────────────── -->
  <div id="view-landing" class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="text-center max-w-sm w-full">
      <div class="text-5xl mb-4">🎉</div>
      <h1 class="text-5xl font-black mb-2 bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent">
        Party Words
      </h1>
      <p class="text-gray-500 mb-6 text-sm">Start a session, share the link, collect words live.</p>

      <input id="party-name-input" placeholder="Name your party (optional)"
        class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white text-sm
               placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors mb-3" />

      <button id="start-btn"
        class="w-full py-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-2xl text-lg font-bold
               hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-violet-900/40 mb-6">
        Start a Party
      </button>

      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px bg-gray-800"></div>
        <span class="text-gray-600 text-xs uppercase tracking-wide">or join</span>
        <div class="flex-1 h-px bg-gray-800"></div>
      </div>

      <div class="flex gap-2">
        <input id="join-input" placeholder="Paste session link or code"
          class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white text-sm
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors" />
        <button id="join-btn"
          class="px-5 py-3 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-xl text-sm font-medium transition-all">
          Join
        </button>
      </div>
    </div>
  </div>

  <!-- ── Party ───────────────────────────────────────────────── -->
  <div id="view-party" class="hidden min-h-screen flex flex-col">

    <!-- Header -->
    <div class="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-900 px-4 py-3">
      <div class="max-w-xl mx-auto flex items-center justify-between gap-3">
        <div class="min-w-0">
          <h1 id="party-name-display" class="text-lg font-black bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent truncate">
            Party Words
          </h1>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button id="copy-btn"
            class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-lg text-xs font-medium transition-all">
            Copy Link
          </button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="max-w-xl mx-auto w-full px-4 pt-8 pb-3">
      <form id="word-form" class="flex gap-3">
        <input id="word-input" placeholder="Type a word…" autocomplete="off" spellcheck="false"
          class="flex-1 bg-gray-900 border border-gray-800 rounded-2xl px-5 py-4 text-lg text-white
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors" />
        <button type="submit"
          class="px-6 py-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-2xl font-bold
                 hover:opacity-90 active:scale-95 transition-all">
          →
        </button>
      </form>
    </div>

    <!-- Words -->
    <div class="max-w-xl mx-auto w-full px-4 pb-10 flex-1">
      <div id="words-list" class="space-y-2"></div>
      <div id="empty-state" class="text-center py-20 text-gray-700">
        <p class="text-3xl mb-3">✏️</p>
        <p class="text-sm">No words yet — be the first!</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                           from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getDatabase, ref, set, runTransaction, onValue }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';

    // ────────────────────────────────────────────────────────────
    // ⚠️  Paste your Firebase project config here
    // ────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyBfQLq2wHfX-t8WNgd1cVyE3suCa6P26mU",
      authDomain:        "party-8bb28.firebaseapp.com",
      databaseURL:       "https://party-8bb28-default-rtdb.firebaseio.com",
      projectId:         "party-8bb28",
      storageBucket:     "party-8bb28.firebasestorage.app",
      messagingSenderId: "823884724230",
      appId:             "1:823884724230:web:28e38bd5b74684c6f62b87",
    };
    // ────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── Helpers ───────────────────────────────────────────────

    function sessionId() {
      // Accept full URL or bare code in the hash
      const raw = location.hash.slice(1);
      try { return new URL(raw).hash.slice(1) || raw; } catch { return raw || null; }
    }

    function generateId() {
      return Array.from(crypto.getRandomValues(new Uint8Array(10)))
        .map(b => b.toString(36).padStart(2, '0')).join('').slice(0, 14);
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── Routing ───────────────────────────────────────────────

    function route() {
      const id = sessionId();
      document.getElementById('view-landing').classList.toggle('hidden', !!id);
      document.getElementById('view-party').classList.toggle('hidden', !id);
      if (id) initParty(id);
    }

    window.addEventListener('hashchange', route);

    // ── Landing ───────────────────────────────────────────────

    document.getElementById('start-btn').addEventListener('click', async () => {
      const id   = generateId();
      const name = document.getElementById('party-name-input').value.trim();
      if (name) await set(ref(db, `sessions/${id}/name`), name);
      location.hash = id;
    });

    document.getElementById('party-name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('start-btn').click();
    });

    document.getElementById('join-btn').addEventListener('click', () => {
      const val = document.getElementById('join-input').value.trim();
      if (!val) return;
      // If it looks like a URL, extract the hash; otherwise treat as bare code
      try {
        const u = new URL(val);
        location.hash = u.hash.slice(1) || val;
      } catch {
        location.hash = val;
      }
    });

    document.getElementById('join-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('join-btn').click();
    });

    // ── Vote state (localStorage) ─────────────────────────────

    function getVotes(sid) {
      try { return JSON.parse(localStorage.getItem(`votes-${sid}`) || '{}'); } catch { return {}; }
    }
    function saveVote(sid, wordKey, dir) {
      const v = getVotes(sid); v[wordKey] = dir;
      localStorage.setItem(`votes-${sid}`, JSON.stringify(v));
    }
    function updateScore(el, word) {
      const score = (word.upvotes || 0) - (word.downvotes || 0);
      const badge = el.querySelector('[data-score]');
      if (!badge) return;
      badge.textContent = (score > 0 ? '+' : '') + score;
      badge.className = 'shrink-0 px-2.5 py-0.5 rounded-full text-xs font-bold w-10 text-center ' + (
        score > 0 ? 'bg-green-900/50 text-green-400' :
        score < 0 ? 'bg-red-900/50 text-red-400' :
                    'bg-gray-800 text-gray-500'
      );
    }

    function applyHighlight(el, dir) {
      const up   = el.querySelector('[data-vote-up]');
      const down = el.querySelector('[data-vote-down]');
      if (!up || !down) return;
      up.classList.toggle('text-green-400', dir === 'up');
      up.classList.toggle('text-gray-500',  dir !== 'up');
      down.classList.toggle('text-red-400',   dir === 'down');
      down.classList.toggle('text-gray-500',  dir !== 'down');
    }

    // ── Party ─────────────────────────────────────────────────

    let partyInited = false;

    function initParty(id) {
      if (partyInited) return; // only wire up once per page load
      partyInited = true;

      // Party name (live, in case someone sets it later)
      onValue(ref(db, `sessions/${id}/name`), snap => {
        const name = snap.val();
        document.getElementById('party-name-display').textContent = name || 'Party Words';
        document.title = name ? `${name} — Party Words` : 'Party Words';
      });

      // Copy link
      const copyBtn = document.getElementById('copy-btn');
      copyBtn.addEventListener('click', async () => {
        await navigator.clipboard.writeText(location.href);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Link', 2000);
      });

      // Submit
      document.getElementById('word-form').addEventListener('submit', async e => {
        e.preventDefault();
        const input = document.getElementById('word-input');
        const text  = input.value.trim();
        if (!text) return;
        input.value = '';
        input.focus();
        const SUBMIT_UPVOTE_WEIGHT = 1;
        const key = text.toLowerCase().replace(/\s+/g, '-');
        let isNew = false;
        await runTransaction(ref(db, `sessions/${id}/words/${key}`), current => {
          if (current === null) { isNew = true; return { text, count: 1, upvotes: 0, downvotes: 0, ts: Date.now() }; }
          return { ...current, upvotes: (current.upvotes || 0) + SUBMIT_UPVOTE_WEIGHT };
        });
        if (!isNew) saveVote(id, key, 'up');
      });

      // Live word list
      const latestWords = new Map();
      let firstLoad = true;

      function makeRow(word, myVotes) {
        const el = document.createElement('div');
        el.dataset.key = word.key;
        el.className = 'word-row flex items-center gap-3 ' +
          'bg-gray-900 border border-gray-800/60 rounded-xl px-4 py-3';
        el.innerHTML =
          `<button data-vote-up class="flex flex-col items-center text-gray-500 hover:text-green-400 transition-colors leading-none">
             <span class="text-base">▲</span>
             <span data-upvotes class="text-xs font-bold mt-0.5">${word.upvotes || 0}</span>
           </button>` +
          `<button data-vote-down class="flex flex-col items-center text-gray-500 hover:text-red-400 transition-colors leading-none">
             <span class="text-base">▼</span>
             <span data-downvotes class="text-xs font-bold mt-0.5">${word.downvotes || 0}</span>
           </button>` +
          `<span class="flex-1 text-base font-semibold tracking-wide">${esc(word.text)}</span>` +
          `<span data-score class="shrink-0 px-2.5 py-0.5 rounded-full text-xs font-bold w-10 text-center"></span>`;
        updateScore(el, word);
        applyHighlight(el, myVotes[word.key]);
        el.querySelector('[data-vote-up]').addEventListener('click', async () => {
          saveVote(id, word.key, 'up');
          applyHighlight(el, 'up');
          await runTransaction(ref(db, `sessions/${id}/words/${word.key}/upvotes`), n => (n || 0) + 1);
        });
        el.querySelector('[data-vote-down]').addEventListener('click', async () => {
          saveVote(id, word.key, 'down');
          applyHighlight(el, 'down');
          await runTransaction(ref(db, `sessions/${id}/words/${word.key}/downvotes`), n => (n || 0) + 1);
        });
        return el;
      }

      function biasedShuffle(words) {
        const now = Date.now();
        return words
          .map(w => {
            const totalVotes = (w.upvotes || 0) + (w.downvotes || 0);
            const ageMins    = (now - (w.ts || now)) / 60000;
            const weight     = 1 / ((totalVotes + 1) * (1 + ageMins / 5));
            return { w, key: Math.random() * weight };
          })
          .sort((a, b) => b.key - a.key)
          .map(x => x.w);
      }

      function applySort(list) {
        list.style.pointerEvents = 'none';
        biasedShuffle([...latestWords.values()]).forEach(w => {
          const el = list.querySelector(`[data-key="${w.key}"]`);
          if (el) list.appendChild(el);
        });
        setTimeout(() => { list.style.pointerEvents = ''; }, 800);
      }

      onValue(ref(db, `sessions/${id}/words`), snap => {
        const data = snap.val();
        const list  = document.getElementById('words-list');
        const empty = document.getElementById('empty-state');

        if (!data) {
          list.innerHTML = '';
          latestWords.clear();
          firstLoad = true;
          empty.classList.remove('hidden');
          return;
        }

        empty.classList.add('hidden');
        const myVotes = getVotes(id);
        const newKeys = [];

        Object.entries(data).forEach(([key, v]) => {
          if (!latestWords.has(key)) newKeys.push(key);
          latestWords.set(key, { key, ...v });
        });
        latestWords.forEach((_, key) => { if (!data[key]) { latestWords.delete(key); list.querySelector(`[data-key="${key}"]`)?.remove(); } });

        // Update existing rows in-place (no repositioning)
        list.querySelectorAll('[data-key]').forEach(el => {
          const word = latestWords.get(el.dataset.key);
          if (!word) return;
          el.querySelector('[data-upvotes]').textContent   = word.upvotes   || 0;
          el.querySelector('[data-downvotes]').textContent = word.downvotes || 0;
          updateScore(el, word);
          applyHighlight(el, myVotes[el.dataset.key]);
        });

        if (firstLoad) {
          biasedShuffle([...latestWords.values()])
            .forEach(word => list.appendChild(makeRow(word, myVotes)));
          firstLoad = false;
        } else {
          // New words go to the top so they're visible immediately
          newKeys.forEach(key => list.prepend(makeRow(latestWords.get(key), myVotes)));
        }
      });

      // Re-sort every 5 seconds
      setInterval(() => {
        const list = document.getElementById('words-list');
        if (list && latestWords.size > 0) applySort(list);
      }, 5000);
    }

    route();
  </script>
</body>
</html>
