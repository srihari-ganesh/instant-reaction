<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Words</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .word-row { animation: slide-in 0.3s ease forwards; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    button { touch-action: manipulation; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Landing -->
  <div id="view-landing" class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="text-center max-w-sm w-full">
      <div class="text-5xl mb-4">🎉</div>
      <h1 class="text-5xl font-black mb-2 bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent">
        Party Words
      </h1>
      <p class="text-gray-500 mb-6 text-sm">Start a session, share the link, collect words live.</p>

      <input id="party-name-input" placeholder="Name your party (optional)"
        class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white text-sm
               placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors mb-3" />

      <button id="start-btn"
        class="w-full py-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-2xl text-lg font-bold
               hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-violet-900/40 mb-6">
        Start a Party
      </button>

      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px bg-gray-800"></div>
        <span class="text-gray-600 text-xs uppercase tracking-wide">or join</span>
        <div class="flex-1 h-px bg-gray-800"></div>
      </div>

      <div class="flex gap-2">
        <input id="join-input" placeholder="Paste session link or code"
          class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white text-sm
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors" />
        <button id="join-btn"
          class="px-5 py-3 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-xl text-sm font-medium transition-all">
          Join
        </button>
      </div>
    </div>
  </div>

  <!-- Player view -->
  <div id="view-player" class="hidden min-h-screen flex flex-col">
    <div class="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-900 px-4 py-3">
      <div class="max-w-xl mx-auto flex items-center justify-between gap-3">
        <h1 id="player-party-name" class="text-lg font-black bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent truncate">
          Party Words
        </h1>
        <button id="player-copy-btn"
          class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-lg text-xs font-medium transition-all">
          Copy Link
        </button>
      </div>
    </div>

    <div class="max-w-xl mx-auto w-full px-4 pt-8 pb-3">
      <form id="word-form" class="flex gap-3">
        <input id="word-input" placeholder="Type a word…" autocomplete="off" spellcheck="false"
          class="flex-1 bg-gray-900 border border-gray-800 rounded-2xl px-5 py-4 text-lg text-white
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors" />
        <button type="submit"
          class="px-6 py-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-2xl font-bold
                 hover:opacity-90 active:scale-95 transition-all">
          →
        </button>
      </form>
    </div>

    <div class="max-w-xl mx-auto w-full px-4 pb-10 flex-1">
      <p class="text-xs text-gray-600 mb-3">Your submissions — only you can see these</p>
      <div id="player-words-list" class="space-y-2"></div>
      <div id="player-empty-state" class="text-center py-20 text-gray-700">
        <p class="text-3xl mb-3">✏️</p>
        <p class="text-sm">Submit your first word above!</p>
      </div>
    </div>
  </div>

  <!-- Admin view -->
  <div id="view-admin" class="hidden min-h-screen flex flex-col">
    <div class="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-900 px-4 py-3">
      <div class="max-w-2xl mx-auto flex items-center justify-between gap-3">
        <div>
          <h1 id="admin-party-name" class="text-lg font-black bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent">
            Party Words
          </h1>
          <span class="text-xs text-amber-400 font-medium">Admin View</span>
        </div>
        <button id="admin-copy-player-btn"
          class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-lg text-xs font-medium transition-all">
          Copy Player Link
        </button>
      </div>
    </div>

    <div class="max-w-2xl mx-auto w-full px-4 pt-6 pb-3">
      <form id="admin-word-form" class="flex gap-3 mb-6">
        <input id="admin-word-input" placeholder="Submit your own word…" autocomplete="off" spellcheck="false"
          class="flex-1 bg-gray-900 border border-gray-800 rounded-2xl px-5 py-4 text-lg text-white
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 transition-colors" />
        <button type="submit"
          class="px-6 py-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-2xl font-bold
                 hover:opacity-90 active:scale-95 transition-all">
          →
        </button>
      </form>
    </div>

    <div class="max-w-2xl mx-auto w-full px-4 pb-10 flex-1">
      <div id="admin-words-list" class="space-y-2"></div>
      <div id="admin-empty-state" class="text-center py-20 text-gray-700">
        <p class="text-3xl mb-3">⏳</p>
        <p class="text-sm">Waiting for submissions…</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getDatabase, ref, set, get, remove, onValue, runTransaction }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyBfQLq2wHfX-t8WNgd1cVyE3suCa6P26mU",
      authDomain:        "party-8bb28.firebaseapp.com",
      databaseURL:       "https://party-8bb28-default-rtdb.firebaseio.com",
      projectId:         "party-8bb28",
      storageBucket:     "party-8bb28.firebasestorage.app",
      messagingSenderId: "823884724230",
      appId:             "1:823884724230:web:28e38bd5b74684c6f62b87",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    function generateId() {
      return Array.from(crypto.getRandomValues(new Uint8Array(10)))
        .map(b => b.toString(36).padStart(2, '0')).join('').slice(0, 14);
    }

    function wordKey(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'word';
    }

    function getUserId() {
      let id = localStorage.getItem('party-user-id');
      if (!id) { id = generateId(); localStorage.setItem('party-user-id', id); }
      return id;
    }

    function parseHash() {
      const raw = location.hash.slice(1);
      if (!raw) return { sessionId: null, adminToken: null };
      const slash = raw.indexOf('/');
      if (slash === -1) return { sessionId: raw, adminToken: null };
      return { sessionId: raw.slice(0, slash), adminToken: raw.slice(slash + 1) };
    }

    function showOnly(id) {
      ['view-landing', 'view-player', 'view-admin'].forEach(v =>
        document.getElementById(v).classList.toggle('hidden', v !== id)
      );
    }

    // ── Landing ───────────────────────────────────────────────

    document.getElementById('start-btn').addEventListener('click', async () => {
      const sessionId  = generateId();
      const adminToken = generateId();
      const name = document.getElementById('party-name-input').value.trim();
      await set(ref(db, `sessions/${sessionId}/adminToken`), adminToken);
      if (name) await set(ref(db, `sessions/${sessionId}/name`), name);
      location.hash = `${sessionId}/${adminToken}`;
    });

    document.getElementById('party-name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('start-btn').click();
    });

    document.getElementById('join-btn').addEventListener('click', () => {
      const val = document.getElementById('join-input').value.trim();
      if (!val) return;
      try {
        const u = new URL(val);
        location.hash = u.hash.slice(1) || val;
      } catch {
        location.hash = val;
      }
    });

    document.getElementById('join-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('join-btn').click();
    });

    // ── Routing ───────────────────────────────────────────────

    let currentView = null;

    async function route() {
      const { sessionId, adminToken } = parseHash();

      if (!sessionId) {
        showOnly('view-landing');
        currentView = 'landing';
        return;
      }

      if (adminToken) {
        const snap = await get(ref(db, `sessions/${sessionId}/adminToken`));
        if (snap.val() === adminToken) {
          if (currentView !== 'admin') {
            currentView = 'admin';
            showOnly('view-admin');
            initAdmin(sessionId);
          }
          return;
        }
      }

      if (currentView !== 'player') {
        currentView = 'player';
        showOnly('view-player');
        initPlayer(sessionId);
      }
    }

    window.addEventListener('hashchange', route);

    // ── Shared submit/delete helpers ─────────────────────────

    async function submitWord(sessionId, userId, text) {
      const key = wordKey(text);
      const userRef = ref(db, `sessions/${sessionId}/userWords/${userId}/${key}`);
      const existing = await get(userRef);
      if (existing.val()) return; // no-op if already submitted
      await runTransaction(ref(db, `sessions/${sessionId}/words/${key}`), current => {
        if (!current) return { text, count: 1 };
        return { ...current, count: (current.count || 0) + 1 };
      });
      await set(userRef, { text, ts: Date.now() });
    }

    async function deleteWord(sessionId, userId, key) {
      await remove(ref(db, `sessions/${sessionId}/userWords/${userId}/${key}`));
      await runTransaction(ref(db, `sessions/${sessionId}/words/${key}/count`),
        n => Math.max(0, (n || 0) - 1));
    }

    // ── Player ────────────────────────────────────────────────

    function initPlayer(sessionId) {
      const userId = getUserId();

      onValue(ref(db, `sessions/${sessionId}/name`), snap => {
        const name = snap.val() || 'Party Words';
        document.getElementById('player-party-name').textContent = name;
        document.title = `${name} — Party Words`;
      });

      const copyBtn = document.getElementById('player-copy-btn');
      copyBtn.addEventListener('click', async () => {
        const url = `${location.origin}${location.pathname}#${sessionId}`;
        await navigator.clipboard.writeText(url);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Link', 2000);
      });

      document.getElementById('word-form').addEventListener('submit', async e => {
        e.preventDefault();
        const input = document.getElementById('word-input');
        const text  = input.value.trim();
        if (!text) return;
        input.value = '';
        input.focus();
        await submitWord(sessionId, userId, text);
      });

      onValue(ref(db, `sessions/${sessionId}/userWords/${userId}`), snap => {
        const data = snap.val();
        const list  = document.getElementById('player-words-list');
        const empty = document.getElementById('player-empty-state');

        list.innerHTML = '';

        if (!data) {
          empty.classList.remove('hidden');
          return;
        }

        empty.classList.add('hidden');
        Object.entries(data)
          .map(([key, v]) => ({ key, ...v }))
          .sort((a, b) => a.text.localeCompare(b.text))
          .forEach(word => list.appendChild(makePlayerRow(word, sessionId, userId)));
      });
    }

    function makePlayerRow(word, sessionId, userId) {
      const el = document.createElement('div');
      el.dataset.key = word.key;
      el.className = 'word-row flex items-center gap-3 bg-gray-900 border border-gray-800/60 rounded-xl px-4 py-3';

      const textSpan = document.createElement('span');
      textSpan.className = 'flex-1 text-base font-semibold tracking-wide';
      textSpan.textContent = word.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'text-xs text-gray-500 hover:text-red-400 transition-colors px-2';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', () => deleteWord(sessionId, userId, word.key));

      el.append(textSpan, deleteBtn);
      return el;
    }

    // ── Admin ─────────────────────────────────────────────────

    function initAdmin(sessionId) {
      const userId = getUserId();

      onValue(ref(db, `sessions/${sessionId}/name`), snap => {
        const name = snap.val() || 'Party Words';
        document.getElementById('admin-party-name').textContent = name;
        document.title = `${name} [Admin] — Party Words`;
      });

      const copyBtn = document.getElementById('admin-copy-player-btn');
      copyBtn.addEventListener('click', async () => {
        const url = `${location.origin}${location.pathname}#${sessionId}`;
        await navigator.clipboard.writeText(url);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Player Link', 2000);
      });

      document.getElementById('admin-word-form').addEventListener('submit', async e => {
        e.preventDefault();
        const input = document.getElementById('admin-word-input');
        const text  = input.value.trim();
        if (!text) return;
        input.value = '';
        input.focus();
        await submitWord(sessionId, userId, text);
      });

      onValue(ref(db, `sessions/${sessionId}/words`), snap => {
        const data = snap.val();
        const list  = document.getElementById('admin-words-list');
        const empty = document.getElementById('admin-empty-state');

        list.innerHTML = '';

        if (!data) {
          empty.classList.remove('hidden');
          return;
        }

        const words = Object.entries(data)
          .map(([key, v]) => ({ key, ...v }))
          .sort((a, b) => b.count - a.count || a.text.localeCompare(b.text));

        empty.classList.add('hidden');
        words.forEach(word => list.appendChild(makeAdminRow(word, sessionId)));
      });
    }

    function makeAdminRow(word, sessionId) {
      const el = document.createElement('div');
      el.dataset.key = word.key;
      el.className = 'word-row flex items-center gap-3 bg-gray-900 border border-gray-800/60 rounded-xl px-4 py-3';

      const countBadge = document.createElement('span');
      countBadge.className = 'shrink-0 w-8 h-8 flex items-center justify-center bg-violet-900/50 text-violet-300 rounded-full text-sm font-bold';
      countBadge.textContent = word.count;

      const textSpan = document.createElement('span');
      textSpan.className = `flex-1 text-base font-semibold tracking-wide ${word.flagged ? 'line-through text-gray-500' : ''}`;
      textSpan.textContent = word.editedText || word.text;
      if (word.editedText) {
        const orig = document.createElement('span');
        orig.className = 'text-xs text-gray-500 ml-2';
        orig.textContent = `(${word.text})`;
        textSpan.append(orig);
      }

      const editBtn = document.createElement('button');
      editBtn.className = 'text-xs text-gray-500 hover:text-violet-400 transition-colors px-2';
      editBtn.textContent = 'Edit';

      const hideBtn = document.createElement('button');
      hideBtn.className = 'text-xs px-2 transition-colors text-gray-500 hover:text-white';
      hideBtn.textContent = word.flagged ? 'Unhide' : 'Hide';

      el.append(countBadge, textSpan, editBtn, hideBtn);

      editBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.value = word.editedText || word.text;
        input.className = 'flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1 text-sm text-white focus:outline-none focus:border-violet-500';

        const saveBtn = document.createElement('button');
        saveBtn.className = 'text-xs text-violet-400 hover:text-violet-300 px-2';
        saveBtn.textContent = 'Save';

        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'text-xs text-gray-500 hover:text-gray-300 px-2';
        cancelBtn.textContent = 'Cancel';

        el.innerHTML = '';
        el.append(countBadge, input, saveBtn, cancelBtn);
        input.focus();
        input.select();

        const doSave = async () => {
          const newText = input.value.trim();
          if (newText && newText !== word.text) {
            await set(ref(db, `sessions/${sessionId}/words/${word.key}/editedText`), newText);
          } else {
            await remove(ref(db, `sessions/${sessionId}/words/${word.key}/editedText`));
          }
        };

        saveBtn.addEventListener('click', doSave);
        cancelBtn.addEventListener('click', () => {
          el.innerHTML = '';
          el.append(countBadge, textSpan, editBtn, hideBtn);
        });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') doSave();
          if (e.key === 'Escape') cancelBtn.click();
        });
      });

      hideBtn.addEventListener('click', () => {
        if (word.flagged) {
          remove(ref(db, `sessions/${sessionId}/words/${word.key}/flagged`));
        } else {
          set(ref(db, `sessions/${sessionId}/words/${word.key}/flagged`), true);
        }
      });

      return el;
    }

    route();
  </script>
</body>
</html>
